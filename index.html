<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Burger Pome | Smash Burgers Pamplona</title>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=Syncopate:wght@700&display=swap');
        
        :root {
            --pome-verde: #1A9E8F;
            --pome-oro: #F5C518;
            --pome-negro: #0B0F0E;
        }

        body {
            background-color: var(--pome-negro);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        .font-title { font-family: 'Syncopate', sans-serif; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0B0F0E; }
        ::-webkit-scrollbar-thumb { background: #1A9E8F; border-radius: 10px; }

        /* Efecto de cristal para el nav */
        .glass {
            background: rgba(11, 15, 14, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { motion, useScroll, useTransform, AnimatePresence } = FramerMotion;

        function App() {
            const { scrollYProgress } = useScroll();
            
            // Efectos Parallax
            const bgY = useTransform(scrollYProgress, [0, 1], ["0%", "30%"]);
            const textY = useTransform(scrollYProgress, [0, 1], ["0%", "100%"]);

            return (
                <div className="relative">
                    
                    {/* NAV */}
                    <nav className="fixed top-0 w-full z-50 glass border-b border-white/10 px-6 py-4 flex justify-between items-center">
                        <div className="font-title text-xl tracking-tighter">
                            BURGER <span className="text-[#1A9E8F]">POME</span>
                        </div>
                        <div className="space-x-6 hidden md:flex text-xs font-bold uppercase tracking-widest">
                            <a href="#carta" className="hover:text-[#1A9E8F] transition-colors">Carta</a>
                            <a href="#galeria" className="hover:text-[#1A9E8F] transition-colors">Fotos</a>
                            <a href="#contacto" className="hover:text-[#1A9E8F] transition-colors text-[#F5C518]">Reservar</a>
                        </div>
                    </nav>

                    {/* HERO SECTION CON PARALLAX */}
                    <section className="relative h-screen flex items-center justify-center overflow-hidden">
                        <motion.div 
                            style={{ y: bgY }}
                            className="absolute inset-0 z-0 bg-[url('https://images.unsplash.com/photo-1550547660-d9450f859349?q=80&w=1920&auto=format&fit=crop')] bg-cover bg-center opacity-30 shadow-[inset_0_0_200px_rgba(0,0,0,0.9)]"
                        />
                        <motion.div style={{ y: textY }} className="relative z-10 text-center">
                            <motion.h1 
                                initial={{ opacity: 0, scale: 0.8 }}
                                animate={{ opacity: 1, scale: 1 }}
                                transition={{ duration: 1 }}
                                className="font-title text-6xl md:text-9xl leading-none mb-6 tracking-tighter"
                            >
                                LA MEJOR<br/>
                                <span className="text-[#1A9E8F]">SMASH</span>
                            </motion.h1>
                            <p className="text-gray-400 tracking-[0.5em] uppercase text-sm md:text-base px-4">Directo desde Pamplona a tu paladar</p>
                        </motion.div>
                        <div className="absolute bottom-10 left-1/2 -translate-x-1/2 animate-bounce opacity-50">
                            ↓
                        </div>
                    </section>

                    {/* CARTA */}
                    <section id="carta" className="py-32 px-6 max-w-5xl mx-auto">
                        <div className="grid md:grid-cols-2 gap-16">
                            <div>
                                <h2 className="font-title text-3xl mb-12 flex items-center gap-4">
                                    <span className="w-12 h-[2px] bg-[#1A9E8F]"></span> CARTA
                                </h2>
                                <div className="space-y-12">
                                    <MenuItem 
                                        nombre="Pome Clásica" 
                                        precio="8.50" 
                                        desc="Doble smash 90g, queso cheddar, cebolla picada y nuestra salsa secreta Pome." 
                                    />
                                    <MenuItem 
                                        nombre="La Trufada" 
                                        precio="10.20" 
                                        desc="Carne madurada, queso provolone, huevo frito y crema de trufa blanca." 
                                    />
                                    <MenuItem 
                                        nombre="Bacon Boom" 
                                        precio="9.50" 
                                        desc="Mermelada de bacon casera, doble queso y extra de crujiente." 
                                    />
                                </div>
                            </div>
                            <div className="bg-zinc-900/50 p-8 rounded-3xl border border-white/5 self-start sticky top-24">
                                <h3 className="font-title text-[#F5C518] mb-4 text-sm tracking-widest">RESEÑA DESTACADA</h3>
                                <p className="italic text-lg text-gray-300">"El local es brutal y la hamburguesa de trufa es de otro planeta. ¡Volveremos!"</p>
                                <div className="mt-4 text-[#1A9E8F] font-black text-xs tracking-tighter">★★★★★ GOOGLE REVIEWS</div>
                            </div>
                        </div>
                    </section>

                    {/* GALERÍA 3D */}
                    <section id="galeria" className="py-20 overflow-hidden">
                        <h2 className="text-center font-title text-2xl mb-16 opacity-20 tracking-[1em]">GALERÍA</h2>
                        <div className="flex flex-wrap justify-center gap-8 px-6">
                            {[1, 2, 3].map((item) => (
                                <motion.div
                                    key={item}
                                    whileHover={{ rotateX: 10, rotateY: -10, scale: 1.05 }}
                                    style={{ perspective: 1000 }}
                                    className="w-full md:w-80 h-96 bg-zinc-800 rounded-2xl overflow-hidden border border-white/10 shadow-2xl"
                                >
                                    <img 
                                        src={`https://images.unsplash.com/photo-1594212699903-ec8a3ecc50f1?q=80&w=800&auto=format&fit=crop`} 
                                        className="w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-500"
                                        alt="Burger Pome"
                                    />
                                </motion.div>
                            ))}
                        </div>
                    </section>

                    {/* CONTACTO */}
                    <section id="contacto" className="py-32 px-6 border-t border-white/5">
                        <div className="max-w-6xl mx-auto grid md:grid-cols-2 gap-20">
                            <div>
                                <h2 className="font-title text-5xl mb-8 leading-tight">¿Hambre?<br/><span className="text-[#F5C518]">Pide ya.</span></h2>
                                <div className="space-y-6">
                                    <div className="group border-b border-white/10 pb-4">
                                        <p className="text-gray-500 text-xs uppercase tracking-widest mb-1">Ubicación</p>
                                        <p className="text-xl">Av. Pío XII, 14, 31008 Pamplona</p>
                                    </div>
                                    <div className="group border-b border-white/10 pb-4">
                                        <p className="text-gray-500 text-xs uppercase tracking-widest mb-1">Teléfono</p>
                                        <a href="tel:686140839" className="text-3xl font-black text-[#1A9E8F] hover:text-[#F5C518] transition-colors">686 140 839</a>
                                    </div>
                                </div>
                            </div>
                            <div className="h-96 rounded-3xl overflow-hidden border-4 border-[#1A9E8F]/20">
                                {/* Placeholder de Mapa con estilo oscuro */}
                                <iframe 
                                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2927.420658428456!2d-1.6565!3d42.8085!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xd50930722880f01%3A0x7d6f5f5f5f5f5f5f!2sAv.%20de%20P%C3%ADo%20XII%2C%2014%2C%2031008%20Pamplona%2C%20Navarra!5e0!3m2!1ses!2ses!4v1700000000000" 
                                    width="100%" height="100%" style={{ border: 0, filter: 'invert(90%) hue-rotate(150deg)' }} 
                                    allowFullScreen="" loading="lazy">
                                </iframe>
                            </div>
                        </div>
                    </section>

                    <footer className="py-12 text-center text-[10px] text-gray-600 tracking-[0.5em] uppercase border-t border-white/5">
                        Burger Pome © 2026 • Design by AI
                    </footer>
                </div>
            );
        }

        function MenuItem({ nombre, precio, desc }) {
            return (
                <motion.div 
                    whileHover={{ x: 10 }}
                    className="cursor-pointer group"
                >
                    <div className="flex justify-between items-baseline mb-2">
                        <h3 className="font-title text-xl group-hover:text-[#1A9E8F] transition-colors uppercase">{nombre}</h3>
                        <span className="text-[#F5C518] font-bold tracking-tighter">{precio}€</span>
                    </div>
                    <p className="text-gray-500 text-sm leading-relaxed">{desc}</p>
                </motion.div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

</body>
</html>
